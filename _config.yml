# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: مدونتي الرقمية
email: your-email@example.com
description: >-
  مدونة شخصية تهتم بمواضيع الذكاء الاصطناعي، التعليم الإلكتروني، إدارة الأعمال، الإنسانيات، ومواضيع متنوعة أخرى.
baseurl: "" # the subpath of your site, e.g. /blog. Important: leave empty for Netlify deployment.
url: "" # the base hostname & protocol for your site, e.g. http://example.com. Will be set by Netlify.

# Build settings
theme: minimal-mistakes-jekyll # Using gem-based theme
# remote_theme: "mmistakes/minimal-mistakes@4.24.0" # Commented out to switch to gem-based theme
minimal_mistakes_skin: "default" # Optional: "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Locale settings
locale: "ar-SA" # For Arabic language support in the theme

# Site Author
author:
  name: "عبدالله اللحام"
  avatar: "/assets/images/profile.png" # Placeholder, user should replace
  bio: "مهتم بالتقنية وتطبيقاتها في مجالات الحياة المختلفة"
  location: "المملكة العربية السعودية"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/abdullah-lajam"
    # Add other social links as needed

# Collections for blog sections (already defined, ensuring they are compatible)
collections:
  ai:
    output: true
    permalink: /:collection/:name
    label: "الذكاء الاصطناعي"
  elearning:
    output: true
    permalink: /:collection/:name
    label: "التعليم الإلكتروني"
  business:
    output: true
    permalink: /:collection/:name
    label: "إدارة الأعمال"
  humanities:
    output: true
    permalink: /:collection/:name
    label: "إنسانيات"
  misc:
    output: true
    permalink: /:collection/:name
    label: "تدوينات متفرقة"

# Navigation links are now in _data/main.yml
# Explicitly tell the theme to use the 'main' navigation data file
navigation: main

# Defaults for posts and pages (can be customized per collection too)
defaults:
  # _posts
  - scope:
      path: "" # an empty string here means all files in the project
      type: "posts"
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true # if you want to enable comments later
      share: true
      related: true
  # _pages
  - scope:
      path: "" # an empty string here means all files in the project
      type: "pages"
    values:
      layout: single
      author_profile: true
  # Collections - Example for 'ai' collection, can be replicated for others
  - scope:
      path: ""
      type: "ai"
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      sidebar:
        nav: "ai_sidenav" # Example for a collection-specific sidebar navigation
  - scope:
      path: ""
      type: "elearning"
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:
      path: ""
      type: "business"
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:
      path: ""
      type: "humanities"
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:
      path: ""
      type: "misc"
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true

# Footer links
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/abdullah-lajam"
    # Add other footer links

# Atom feed
feed:
  path: atom.xml

# Plugins (already in Gemfile, ensuring they are listed if needed by theme)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - netlify.toml # if you add one later
  - .jekyll-cache/

# Kramdown Configuration
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

